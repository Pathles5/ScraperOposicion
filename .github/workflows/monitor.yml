name: Monitor CM Educacion

on:
  schedule:
    # Cada 30 minutos, en los minutos :05 y :35 (UTC)
    - cron: "5,35 * * * *"
  # Lanzamiento manual desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-cm
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run monitor
        env:
          # Fase 2: notificación real vía Telegram Bot API.
          # Los secrets viven en el GitHub Environment "main" (no a nivel de repo),
          # por eso este job referencia `environment: main` arriba.
          # Nombre del secret en GitHub: TELEGRAM_BOT_TOKEN_HTTP (el usuario lo llamó así).
          # Se mapea a la variable de entorno TELEGRAM_BOT_TOKEN que lee el código.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_HTTP }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node monitor.js

      - name: Commit state.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.txt
          if git diff --cached --quiet; then
            echo "Sin cambios en state.txt, nada que commitear."
          else
            git commit -m "chore(state): update last update date"
            git push
          fi